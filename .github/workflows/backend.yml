name: Backend Build and Push Docker

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/trade_sys

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push data-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/data_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-data-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-data-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push event-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/event_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-event-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-event-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fusion-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/fusion_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-fusion-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-fusion-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push strategy-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/strategy_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-strategy-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-strategy-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push llm-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/llm_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-llm-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-llm-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
