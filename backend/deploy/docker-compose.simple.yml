services:
  api-server:
    build:
      context: ..
      dockerfile: api_server.Dockerfile
    container_name: api-server
    ports:
      - "8001:8001"
    networks:
      - kafka-network
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      API_PORT: "8001"
      EXECUTION_SERVICE_URL: "http://execution-service:8000"
      DATA_SERVICE_URL: "http://data-service:8002"
    restart: unless-stopped

  execution-service:
    build:
      context: ..
      dockerfile: api_server.Dockerfile
    container_name: execution-service
    command: python -m services.execution_service.http_server
    ports:
      - "8000:8000"
    networks:
      - kafka-network
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      EXECUTION_MOCK: "true"
    restart: unless-stopped

networks:
  kafka-network:
    driver: bridge
