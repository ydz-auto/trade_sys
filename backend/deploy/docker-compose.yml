services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_COMPRESSION_TYPE: gzip
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_AUTO_LEADER_REBALANCE_ENABLE: "true"
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 30000
      KAFKA_REQUEST_TIMEOUT_MS: 30000
      KAFKA_METADATA_MAX_AGE_MS: 300000
    networks:
      - kafka-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    networks:
      - kafka-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: tradeagent
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    networks:
      - kafka-network
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - kafka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - kafka-network
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - kafka-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "6831:6831/udp"
      - "6832:6832/udp"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    networks:
      - kafka-network
    restart: unless-stopped

  ingestion-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ingestion-runtime
    container_name: ingestion-runtime
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    restart: unless-stopped

  signal-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: signal-runtime
    container_name: signal-runtime
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    restart: unless-stopped

  execution-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: execution-runtime
    container_name: execution-runtime
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      EXECUTION_MOCK: "true"
      EXECUTION_EXCHANGE: "binance"
      EXECUTION_TESTNET: "true"
      EXECUTION_MARKET_TYPE: "spot"
      RISK_MAX_POSITION_VALUE: "10000"
      RISK_MAX_POSITION_COUNT: "10"
      RISK_MAX_LEVERAGE: "10"
      RISK_MAX_DAILY_LOSS_PCT: "0.1"
      RISK_MAX_DRAWDOWN_PCT: "0.2"
    restart: unless-stopped

  projection-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: projection-runtime
    container_name: projection-runtime
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    restart: unless-stopped

  correlation-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: correlation-runtime
    container_name: correlation-runtime
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      CORRELATION_SYMBOLS: "BTC,ETH"
      CORRELATION_TIMEFRAMES: "1h,4h"
      CORRELATION_INTERVAL: "3600"
      CORRELATION_OUTPUT_DIR: "/app/data/correlation_results"
      CORRELATION_KAFKA_ENABLED: "true"
    volumes:
      - correlation_data:/app/data/correlation_results
    restart: unless-stopped

  narrative-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: narrative-runtime
    container_name: narrative-runtime
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    restart: unless-stopped

  monitoring-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: monitoring-runtime
    container_name: monitoring-runtime
    depends_on:
      kafka:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      PROMETHEUS_URL: http://prometheus:9090
    restart: unless-stopped

  scheduler-runtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: scheduler-runtime
    container_name: scheduler-runtime
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    restart: unless-stopped

  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api-server
    container_name: api-server
    ports:
      - "8001:8001"
    depends_on:
      - kafka
      - redis
      - prometheus
      - ingestion-runtime
      - signal-runtime
      - execution-runtime
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      API_PORT: "8001"
    restart: unless-stopped

networks:
  kafka-network:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
  clickhouse_data:
  clickhouse_logs:
  prometheus_data:
  grafana_data:
  tempo_data:
  correlation_data:
