version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    networks:
      - kafka-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - kafka-network
    volumes:
      - redis_data:/data
    restart: unless-stopped

  data-service:
    image: python:3.12-slim
    container_name: data-service
    working_dir: /app
    command: ["bash", "-c", "pip install --no-cache-dir -r services/data_service/requirements.txt && python -m services.data_service.main_kafka"]
    volumes:
      - ..:/app:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app

  event-service:
    image: python:3.12-slim
    container_name: event-service
    working_dir: /app
    command: ["bash", "-c", "pip install --no-cache-dir -r services/event_service/requirements.txt && python -m services.event_service.main_kafka"]
    volumes:
      - ..:/app:ro
    depends_on:
      kafka:
        condition: service_healthy
      data-service:
        condition: service_started
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app

  fusion-service:
    image: python:3.12-slim
    container_name: fusion-service
    working_dir: /app
    command: ["bash", "-c", "pip install --no-cache-dir -r services/fusion_service/requirements.txt && python -m services.fusion_service.main_kafka"]
    volumes:
      - ..:/app:ro
    depends_on:
      kafka:
        condition: service_healthy
      event-service:
        condition: service_started
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app

  strategy-service:
    image: python:3.12-slim
    container_name: strategy-service
    working_dir: /app
    command: ["bash", "-c", "pip install --no-cache-dir -r services/strategy_service/requirements.txt && python -m services.strategy_service.main_kafka"]
    volumes:
      - ..:/app:ro
    depends_on:
      kafka:
        condition: service_healthy
      fusion-service:
        condition: service_started
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app

  api-service:
    image: python:3.12-slim
    container_name: api-service
    working_dir: /app
    command: ["bash", "-c", "pip install --no-cache-dir fastapi==0.109.0 uvicorn==0.27.0 httpx feedparser beautifulsoup4 && python api_server_simple.py"]
    volumes:
      - ..:/app:ro
    ports:
      - "8001:8001"
    depends_on:
      - data-service
      - kafka
    networks:
      - kafka-network
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      API_PORT: "8001"

networks:
  kafka-network:
    driver: bridge

volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
