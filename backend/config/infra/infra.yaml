# Infrastructure Configuration
# 基础设施配置

redis:
  url: "${REDIS_URL:-redis://localhost:6379/0}"
  max_connections: 100
  connection_timeout: 5
  socket_timeout: 5
  
kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}"
  consumer_config:
    auto_offset_reset: "latest"
    enable_auto_commit: true
    max_poll_records: 1000
    session_timeout_ms: 30000
  producer_config:
    acks: "all"
    retries: 3
    batch_size: 16384
    linger_ms: 5
    
clickhouse:
  host: "${CLICKHOUSE_HOST:-localhost}"
  port: 9000
  http_port: 8123
  database: "${CLICKHOUSE_DATABASE:-tradeagent}"
  user: "${CLICKHOUSE_USERNAME:-default}"
  password: "${CLICKHOUSE_PASSWORD:-}"
  connection_timeout: 10
  send_receive_timeout: 300
  
postgresql:
  host: "${POSTGRES_HOST:-localhost}"
  port: 5432
  database: "${POSTGRES_DATABASE:-tradeagent}"
  user: "${POSTGRES_USERNAME:-postgres}"
  password: "${POSTGRES_PASSWORD:-postgres}"
  min_connections: 5
  max_connections: 20
  
temporal:
  host: "${TEMPORAL_HOST:-localhost}"
  port: 7233
  namespace: "default"
  
data_lake:
  smb_host: "${DATA_LAKE_SMB_HOST:-192.168.1.14}"
  smb_share: "${DATA_LAKE_SMB_SHARE:-00_crypto}"
  smb_path: "${DATA_LAKE_SMB_PATH:-00_code/backend/data_lake}"
  local_path: "${DATA_LAKE_LOCAL_PATH:-./data_lake}"
  use_smb: "${DATA_LAKE_USE_SMB:-false}"
