# Replay Environment Configuration
# 回放环境配置（用于回测和历史数据回放）

environment: replay

debug: true
log_level: DEBUG

kafka:
  bootstrap_servers: "localhost:9092"
  consumer_group: "replay-group"
  
redis:
  url: "redis://localhost:6379/1"
  
clickhouse:
  host: "localhost"
  port: 9000
  database: "tradeagent_replay"
  
postgresql:
  host: "localhost"
  port: 5432
  database: "tradeagent_replay"
  user: "postgres"
  password: "postgres"

replay:
  mode: "fast"
  start_time: null
  end_time: null
  symbols:
    - "BTCUSDT"
    - "ETHUSDT"
