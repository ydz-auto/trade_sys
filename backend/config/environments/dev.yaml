# Development Environment Configuration
# 开发环境配置

environment: dev

debug: true
log_level: DEBUG

kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}"
  
redis:
  url: "${REDIS_URL:-redis://localhost:6379/0}"
  
clickhouse:
  host: "${CLICKHOUSE_HOST:-localhost}"
  port: 9000
  database: "${CLICKHOUSE_DATABASE:-tradeagent_dev}"
  
postgresql:
  host: "${POSTGRES_HOST:-localhost}"
  port: 5432
  database: "${POSTGRES_DATABASE:-tradeagent_dev}"
  user: "${POSTGRES_USERNAME:-postgres}"
  password: "${POSTGRES_PASSWORD:-postgres}"

observability:
  prometheus:
    enabled: true
    port: 9090
  jaeger:
    enabled: true
    endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}"

data_lake:
  smb_host: "${DATA_LAKE_SMB_HOST:-192.168.1.14}"
  smb_share: "${DATA_LAKE_SMB_SHARE:-00_crypto}"
  smb_path: "${DATA_LAKE_SMB_PATH:-00_code/backend/data_lake}"
  local_path: "${DATA_LAKE_LOCAL_PATH:-./data_lake}"
  use_smb: false
