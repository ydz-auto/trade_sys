# Production Environment Configuration
# 生产环境配置

environment: prod

debug: false
log_level: INFO

kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
  
redis:
  url: "${REDIS_URL}"
  
clickhouse:
  host: "${CLICKHOUSE_HOST}"
  port: 9000
  database: "tradeagent"
  
postgresql:
  host: "${POSTGRES_HOST}"
  port: 5432
  database: "tradeagent"
  user: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"

observability:
  prometheus:
    enabled: true
    port: 9090
  jaeger:
    enabled: true
    endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"

data_lake:
  smb_host: "${DATA_LAKE_SMB_HOST:-192.168.1.14}"
  smb_share: "${DATA_LAKE_SMB_SHARE:-00_crypto}"
  smb_path: "${DATA_LAKE_SMB_PATH:-00_code/backend/data_lake}"
  local_path: "${DATA_LAKE_LOCAL_PATH:-./data_lake}"
  use_smb: "${DATA_LAKE_USE_SMB:-true}"
