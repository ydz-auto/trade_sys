<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 16px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .header img {
            width: 32px;
            height: 32px;
        }
        
        .header-text h2 {
            font-size: 14px;
            font-weight: 600;
        }
        
        .header-text p {
            font-size: 11px;
            color: #888;
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.connected {
            background: #4caf50;
            box-shadow: 0 0 6px #4caf50;
        }
        
        .status-dot.disconnected {
            background: #f44336;
            box-shadow: 0 0 6px #f44336;
        }
        
        .status-label {
            font-size: 12px;
            color: #aaa;
        }
        
        .status-value {
            font-size: 12px;
            margin-left: auto;
        }
        
        .status-value.connected {
            color: #81c784;
        }
        
        .status-value.disconnected {
            color: #e57373;
        }
        
        .server-info {
            margin-top: 8px;
            font-size: 11px;
            color: #666;
            word-break: break-all;
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 100%);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(79, 195, 247, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .stats {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stats-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #4fc3f7;
        }
        
        .stat-label {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }
        
        .footer {
            margin-top: 12px;
            text-align: center;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon48.png" alt="Logo">
        <div class="header-text">
            <h2>Twitter Push</h2>
            <p>TradeAgent 推送通知</p>
        </div>
    </div>
    
    <div class="status-card">
        <div class="status-row">
            <span id="statusDot" class="status-dot disconnected"></span>
            <span class="status-label">连接状态</span>
            <span id="statusText" class="status-value disconnected">未连接</span>
        </div>
        <div id="serverInfo" class="server-info">服务器: -</div>
    </div>
    
    <div class="actions">
        <button id="reconnectBtn" class="btn btn-primary">重新连接</button>
        <button id="settingsBtn" class="btn btn-secondary">设置</button>
    </div>
    
    <div class="stats">
        <div class="stats-title">统计信息</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div id="queuedCount" class="stat-value">0</div>
                <div class="stat-label">排队消息</div>
            </div>
            <div class="stat-item">
                <div id="reconnectCount" class="stat-value">0</div>
                <div class="stat-label">重连次数</div>
            </div>
        </div>
    </div>
    
    <div class="footer">v1.0.0</div>
    
    <script src="popup.js"></script>
</body>
</html>
